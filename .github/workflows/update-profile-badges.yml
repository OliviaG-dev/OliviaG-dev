name: Update profile badges
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
permissions:
  contents: write
concurrency:
  group: profile-badges-main
  cancel-in-progress: true
jobs:
  update-badges:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Fetch totals from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: OliviaG-dev
        run: |
          mkdir -p .github/badges
          commits=$(curl -s -H "Authorization: bearer $GH_TOKEN" -X POST https://api.github.com/graphql \
            -d "{\"query\":\"query { user(login: \\\"$USERNAME\\\") { contributionsCollection { contributionCalendar { totalContributions } } } }\"}" \
            | jq -r '.data.user.contributionsCollection.contributionCalendar.totalContributions')
          prs=$(curl -s -H "Authorization: bearer $GH_TOKEN" -X POST https://api.github.com/graphql \
            -d "{\"query\":\"query { user(login: \\\"$USERNAME\\\") { pullRequests { totalCount } } }\"}" \
            | jq -r '.data.user.pullRequests.totalCount')
          cat > .github/badges/commits.json <<EOF
          { "schemaVersion": 1, "label": "commits (last 12 months)", "message": "${commits}", "color": "5B2A86" }
          EOF
          cat > .github/badges/pull_requests.json <<EOF
          { "schemaVersion": 1, "label": "pull requests", "message": "${prs}", "color": "7A284E" }
          EOF
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/badges/commits.json .github/badges/pull_requests.json
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: update profile badges"
          git pull --rebase origin main
          git push origin HEAD:main
